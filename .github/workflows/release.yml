name: Build and Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ZIP file
        run: |
          zip -r yt-reader-mode.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x ".agents/**" \
            -x ".kiro/**" \
            -x "node_modules/**" \
            -x "coverage/**" \
            -x "web-ext-artifacts/**" \
            -x "README.md" \
            -x "CONTRIBUTING.md" \
            -x "vitest.config.js" \
            -x "src/test-setup.js" \
            -x "src/**/__tests__/**" \
            -x ".nvmrc" \
            -x "pnpm-*" \
            -x "package.json" \
            -x ".web-ext-config.mjs" \
            -x "sonar-project.properties" \
            -x "skills-lock.json"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-reader-mode-zip
          path: yt-reader-mode.zip
          
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: yt-reader-mode.zip
          generate_release_notes: true
