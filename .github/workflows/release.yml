name: Build and Release Extension

on:
  push:
    branches: [main]

env:
  WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
  WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.check-version.outputs.version }}
      released: ${{ steps.check-version.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version and check tag
        id: check-version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ZIP
        if: steps.check-version.outputs.released == 'false'
        run: |
          zip -r yt-reader-mode.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x ".agents/**" \
            -x ".kiro/**" \
            -x "node_modules/**" \
            -x "coverage/**" \
            -x "web-ext-artifacts/**" \
            -x "README.md" \
            -x "CONTRIBUTING.md" \
            -x "vitest.config.js" \
            -x "src/test-setup.js" \
            -x "src/**/__tests__/**" \
            -x ".nvmrc" \
            -x "pnpm-*" \
            -x "package.json" \
            -x ".web-ext-config.mjs" \
            -x "sonar-project.properties" \
            -x "skills-lock.json"

      - name: Upload Artifact
        if: steps.check-version.outputs.released == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: yt-reader-mode-zip
          path: yt-reader-mode.zip

      - name: Create GitHub Release
        if: steps.check-version.outputs.released == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check-version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: yt-reader-mode.zip
          generate_release_notes: true

      - name: Submit to Firefox Add-ons
        if: steps.check-version.outputs.released == 'false'
        run: |
          npx --yes web-ext@8 sign \
            --source-dir . \
            --channel listed \
            --approval-timeout 0
