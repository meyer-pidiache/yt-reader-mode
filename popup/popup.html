<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Reader Mode</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="header">
    <img src="../icons/48.png" class="header-icon" alt="Icon">
    <div class="header-text">
      <h1 data-i18n="appName">YT Reader Mode</h1>
      <span>v0.1.1</span>
    </div>
  </div>

  <div class="section">
    <div class="toggle-row">
      <span class="toggle-label" data-i18n="autoActivateLabel">Auto-activate Reader Mode</span>
      <label class="toggle-switch">
        <input type="checkbox" id="autoActivate">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="card">
      <div class="card-header">
        <span class="card-title" data-i18n="initialPromptTitle">Initial Prompt</span>
      </div>
      <div class="toggle-row" style="margin-bottom: 12px;">
        <span class="toggle-label" data-i18n="sendAutomaticallyLabel">Send automatically</span>
        <label class="toggle-switch">
          <input type="checkbox" id="initialPromptEnabled">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <textarea id="initialPromptText" class="textarea"
        data-i18n="initialPromptPlaceholder" placeholder="Enter a prompt to send automatically..."></textarea>
      <button id="savePrompt" class="btn" data-i18n="savePromptButton">Save Prompt</button>
    </div>
  </div>

  <div class="footer" data-i18n="footerDescription">
    Automatically replaces the video player with YouTube AI Chat
  </div>

  <script src="popup.js"></script>
</body>

</html>
