<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__MSG_appName__</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="header">
    <img src="../icons/48.png" class="header-icon" alt="Icon">
    <div class="header-text">
      <h1>__MSG_appName__</h1>
      <span>v0.1.0</span>
    </div>
  </div>

  <div class="section">
    <div class="toggle-row">
      <span class="toggle-label">__MSG_autoActivateLabel__</span>
      <label class="toggle-switch">
        <input type="checkbox" id="autoActivate">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="card">
      <div class="card-header">
        <span class="card-title">__MSG_initialPromptTitle__</span>
      </div>
      <div class="toggle-row" style="margin-bottom: 12px;">
        <span class="toggle-label">__MSG_sendAutomaticallyLabel__</span>
        <label class="toggle-switch">
          <input type="checkbox" id="initialPromptEnabled">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <textarea id="initialPromptText" class="textarea"
        placeholder="__MSG_initialPromptPlaceholder__"></textarea>
      <button id="savePrompt" class="btn">__MSG_savePromptButton__</button>
    </div>
  </div>

  <div class="footer">
    __MSG_footerDescription__
  </div>

  <script src="popup.js"></script>
</body>

</html>
